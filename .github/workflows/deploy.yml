name: Deploy Global-Proxy to VPS

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'
        type: string

concurrency:
  group: deploy-proxy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          envs: DEPLOY_BRANCH
          script_stop: true
          script: |
            set -euo pipefail
            
            echo ">>> Pulling latest deployment script..."
            cd /opt/Global-Proxy
            git fetch origin
            git checkout "${DEPLOY_BRANCH}"
            git pull origin "${DEPLOY_BRANCH}"
            
            echo ">>> Executing deployment script..."
            chmod +x deploy.sh
            bash deploy.sh "${DEPLOY_BRANCH}"
        env:
          DEPLOY_BRANCH:  ${{ github.event.inputs.branch }}
